<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#090b10" />
  <title>Adoranza Pro v7</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    :root{
      --bg:#090b10;
      --panel:#121722;
      --panel2:#171d2b;
      --panel3:#0f141f;
      --text:#eef2f7;
      --muted:#9aa6b2;
      --line:rgba(255,255,255,.10);
      --line2:rgba(255,255,255,.16);
      --accent:#f4c542;
      --accent2:#ffe08a;
      --blue:#7cc7e8;
      --green:#52d273;
      --red:#f06072;
      --shadow:0 18px 46px rgba(0,0,0,.34);
      --shadow2:0 10px 24px rgba(0,0,0,.24);
      --sans:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      padding-top:86px;
      font-family:var(--sans);
      color:var(--text);
      background:
        radial-gradient(1000px 640px at 10% -15%,rgba(244,197,66,.10),transparent 56%),
        radial-gradient(860px 520px at 100% -10%,rgba(124,199,232,.08),transparent 58%),
        var(--bg);
      overflow-x:hidden;
    }
    body.controls-hidden{padding-top:8px}
    button,input,textarea{font:inherit}
    button{-webkit-tap-highlight-color:transparent}
    .btn{
      min-height:36px;
      border:1px solid var(--line2);
      border-radius:10px;
      padding:8px 12px;
      color:var(--text);
      background:rgba(255,255,255,.045);
      font-size:12px;
      font-weight:850;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      user-select:none;
      white-space:nowrap;
    }
    .btn:active{transform:translateY(1px) scale(.99);filter:brightness(1.08)}
    .btn-primary{background:var(--accent);border-color:rgba(244,197,66,.88);color:#111827}
    .btn-blue{background:rgba(124,199,232,.13);border-color:rgba(124,199,232,.36);color:#dff6ff}
    .btn-green{background:rgba(82,210,115,.12);border-color:rgba(82,210,115,.45);color:#d9ffe2}
    .btn-red{background:rgba(240,96,114,.12);border-color:rgba(240,96,114,.44);color:#ffe1e6}
    .btn-ghost{background:rgba(255,255,255,.025)}
    .btn-icon{width:40px;padding:0;font-size:16px}
    #roleSelector{
      position:fixed;
      inset:0;
      z-index:10000;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:18px;
      padding:22px;
      background:
        radial-gradient(900px 560px at 10% 8%,rgba(244,197,66,.12),transparent 56%),
        radial-gradient(860px 540px at 100% 8%,rgba(124,199,232,.10),transparent 58%),
        var(--bg);
    }
    .brand-mark{
      text-align:center;
      margin-bottom:4px;
    }
    .brand-mark h1{
      margin:0;
      color:var(--accent);
      font-size:28px;
      letter-spacing:.01em;
