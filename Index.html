<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d12" />
  <link rel="manifest" href="./manifest.json" />

  <title>6.25 Adoranza Pro v6.5</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <script>
    /* ===== ADORANZA PRO HOTFIX v6.5 =====
       Pegar después del script principal y antes de </body>.
    */
    (function () {
      const APP_VERSION = "ADORANZA PRO v6.5";
    
      function $(id) {
        return document.getElementById(id);
      }
    
      function txt(value) {
        return document.createTextNode(String(value ?? ""));
      }
    
      function el(tag, className, textValue) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (textValue != null) node.textContent = String(textValue);
        return node;
      }
    
      function toNumber(value, fallback = null) {
        if (value === null || value === undefined || value === "") return fallback;
        const n = Number(value);
        return Number.isFinite(n) ? n : fallback;
      }
    
      function markDirty() {
        if (typeof state !== "undefined" && state.listIdUnico) {
          state.hasUnsavedChanges = true;
        }
      }
    
      function setChildren(parent, children) {
        parent.textContent = "";
        children.forEach(child => parent.appendChild(child));
      }
    
      function renderChordText(container, raw) {
        container.textContent = "";
    
        const parts = String(raw || "").split(/(\[[^\]]+\])/g);
    
        for (const part of parts) {
          if (!part) continue;
    
          if (/^\[[^\]]+\]$/.test(part)) {
            const span = document.createElement("span");
            span.className = "chord";
            span.textContent = part;
            container.appendChild(span);
          } else {
            container.appendChild(document.createTextNode(part));
          }
        }
      }
    
      function normalizeTransposeSteps(value) {
        const n = toNumber(value, 0);
        if (!Number.isFinite(n)) return 0;
        return n;
      }
    
      function getEffectiveBpm(song, fallback = 120) {
        return toNumber(song?.bpm_override, toNumber(song?.bpm, fallback));
      }
    
      function getVisibleIndexes() {
        return state.setlist
          .map((song, index) => ({ song, index }))
          .filter(x => x.song && !isHidden(x.song))
          .map(x => x.index);
      }
    
      function getPrevVisibleIndex(fromIdx) {
        const visible = getVisibleIndexes();
        for (let i = visible.length - 1; i >= 0; i--) {
          if (visible[i] < fromIdx) return visible[i];
        }
        return -1;
      }
    
      function getNextVisibleIndexFixed(fromIdx) {
        const visible = getVisibleIndexes();
        for (const idx of visible) {
          if (idx > fromIdx) return idx;
        }
        return -1;
      }
    
      function updateVersionLabels() {
        document.title = "Adoranza Pro v6.5";
        const roleTitle = document.querySelector("#roleSelector h1");
        if (roleTitle) roleTitle.textContent = APP_VERSION;
      }
    
      /* Corrige overrides de Supabase aunque vengan como string */
      normalizeOverrides = function normalizeOverridesFixed(canciones_json) {
        const arr = Array.isArray(canciones_json) ? canciones_json : [];
        const map = new Map();
    
        for (const x of arr) {
          const key = x?.id || x?.song_id;
          if (!key) continue;
    
          map.set(key, {
            bpm_override: toNumber(x.bpm_override, null),
            tono_override:
              typeof x.tono_override === "string" && x.tono_override.trim()
                ? x.tono_override.trim()
                : null,
            transpose_steps: toNumber(x.transpose_steps, 0)
          });
        }
    
        return map;
      };
    
      /* Guarda también tono_override y normaliza números */
      buildCloudSetlistPayload = function buildCloudSetlistPayloadFixed() {
        const ids = state.setlist.map(s => s.id).filter(Boolean);
    
        const overrides = state.setlist
          .filter(s => s && s.id)
          .map(s => ({
            id: s.id,
            transpose_steps: normalizeTransposeSteps(s.transpose_steps),
            bpm_override: toNumber(s.bpm_override, null),
            tono_override:
              typeof s.tono_override === "string" && s.tono_override.trim()
                ? s.tono_override.trim()
                : null
          }));
    
        return { canciones_ids: ids, canciones_json: overrides };
      };
    
      /* Evita que localStorage rompa la app si se llena */
      saveLocal = function saveLocalFixed() {
        try {
          localStorage.setItem("adoranza_v4_setlist", JSON.stringify(state.setlist));
        } catch (e) {
          console.warn("No se pudo guardar localmente:", e);
          appAlert(
            "No se pudo guardar localmente. Es posible que el almacenamiento del navegador esté lleno."
          );
        }
      };
    
      updateNowNextInfo = function updateNowNextInfoFixed() {
        const info = $("current-song-info");
        const next = $("next-song-info");
        const curr = state.setlist[state.currentIndex];
    
        if (!next) return;
    
        if (!curr) {
          if (info) info.textContent = "Adoranza Cloud";
          next.textContent = "";
          return;
        }
    
        const nextIdx = getNextVisibleIndexFixed(state.currentIndex);
        const nextSong = nextIdx >= 0 ? state.setlist[nextIdx] : null;
    
        next.textContent = "";
    
        const main = document.createTextNode(nextSong ? nextSong.titulo || "(Sin título)" : "(no hay más)");
        const sub = el("span", "sub2", "Siguiente");
    
        next.appendChild(main);
        next.appendChild(sub);
      };
    
      renderFavoritesInConfig = function renderFavoritesInConfigFixed() {
        const box = $("favList");
        if (!box) return;
    
        const favs = getFavorites();
        const arr = Object.values(favs || {}).sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
        const count = $("favCount");
    
        if (count) count.textContent = `(${arr.length})`;
        box.textContent = "";
    
        if (!arr.length) {
          const empty = el("div", "", "No hay favoritos offline.");
          empty.style.cssText = "color:var(--muted); font-size:12px;";
          box.appendChild(empty);
          return;
        }
    
        arr.forEach(f => {
          const item = el("div", "item");
          item.style.cssText =
            "display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,.05); padding:8px; border-radius:8px;";
    
          const info = el("div");
          info.style.cssText = "flex:1; cursor:pointer;";
          info.onclick = ev => openFavorite(f.key, ev);
    
          const title = el("div", "", f.titulo || "(Sin título)");
          title.style.cssText = "font-weight:700; font-size:13px;";
    
          const artist = el("div", "", f.artista || "");
          artist.style.cssText = "font-size:11px; color:var(--muted);";
    
          const btn = el("button", "btn danger-x", "✕");
          btn.style.cssText = "max-width:30px; height:30px; padding:0;";
          btn.onclick = ev => removeFavorite(f.key, ev);
    
          info.appendChild(title);
          info.appendChild(artist);
          item.appendChild(info);
          item.appendChild(btn);
          box.appendChild(item);
        });
      };
    
      renderAll = function renderAllFixed() {
        const sl = $("setList");
        if (!sl) return;
    
        sl.textContent = "";
    
        const visible = state.setlist
          .map((s, originalIndex) => ({ s, originalIndex }))
          .filter(x => !isHidden(x.s));
    
        visible.forEach(({ s, originalIndex }) => {
          const wrap = el("div", "set-item-wrap");
    
          const actions = el("div", "swipe-actions");
          const left = el("div", "swipe-action left", "Quitar");
          const right = el("div", "swipe-action right", "Cantada");
          actions.appendChild(left);
          actions.appendChild(right);
    
          const row = el("div", "set-item");
          row.dataset.idx = String(originalIndex);
    
          const favOn = isFav(s);
    
          if (originalIndex === state.currentIndex) row.classList.add("is-active");
          if (isSung(s)) row.classList.add("is-sung");
          if (favOn) row.classList.add("is-fav");
          if (state.moveModeIndex === originalIndex) row.classList.add("is-move-mode");
    
          if (state.moveModeIndex === originalIndex) {
            const controls = el("div", "move-controls");
    
            const up = el("button", "move-btn", "↑");
            up.onclick = ev => moveSongByIndex(originalIndex, -1, ev);
    
            const down = el("button", "move-btn", "↓");
            down.onclick = ev => moveSongByIndex(originalIndex, 1, ev);
    
            controls.appendChild(up);
            controls.appendChild(down);
            row.appendChild(controls);
          } else {
            row.appendChild(el("span", "drag-handle", "☰"));
          }
    
          const titlebox = el("div", "titlebox");
    
          const title = el("div", "songtitle", s.titulo || "(Sin título)");
          const metaParts = [];
          if (s.artista) metaParts.push(s.artista);
          if (favOn) metaParts.push("Offline");
          if (isSung(s)) metaParts.push("Cantada");
    
          const meta = el("div", "songmeta", metaParts.join(" · "));
    
          titlebox.appendChild(title);
          titlebox.appendChild(meta);
    
          const heart = el("div", `pill heart ${favOn ? "on" : ""}`, favOn ? "♥" : "♡");
          heart.onclick = ev => toggleFavByIndex(originalIndex, ev);
    
          row.appendChild(titlebox);
          row.appendChild(heart);
    
          row.onclick = () => seleccionar(originalIndex);
    
          wrap.appendChild(actions);
          wrap.appendChild(row);
          sl.appendChild(wrap);
    
          if (state.userRole !== "musico") attachSwipe(row);
          attachLongPressMoveMode(row);
        });
    
        renderBadge();
    
        const currHidden =
          state.currentIndex >= 0 &&
          state.setlist[state.currentIndex] &&
          isHidden(state.setlist[state.currentIndex]);
    
        if (currHidden) {
          const nextVisible = getNextVisibleIndexFixed(state.currentIndex);
          state.currentIndex = nextVisible >= 0 ? nextVisible : getPrevVisibleIndex(state.currentIndex);
        }
    
        const curr = state.setlist[state.currentIndex];
        const view = $("viewContent");
        const info = $("current-song-info");
        const dots = $("metro-dots");
    
        if (curr && view) {
          if (info) {
            info.textContent = "";
    
            const titleNode = document.createTextNode(curr.titulo || "");
            const sub = el("span", "sub");
    
            if (state.userRole === "drums") {
              const bpmShown = getEffectiveBpm(curr, null);
              const shown = state.half && bpmShown ? bpmShown / 2 : bpmShown ?? "-";
              sub.textContent = `BPM: ${shown}`;
            } else {
              const step = normalizeTransposeSteps(curr.transpose_steps);
              const artist = curr.artista || "";
              sub.textContent = step ? `${artist} · ${step > 0 ? "+" : ""}${step}` : artist;
            }
    
            info.appendChild(titleNode);
            info.appendChild(sub);
          }
    
          updateNowNextInfo();
    
          if (dots) {
            dots.classList.toggle("is-hidden", state.userRole === "musico");
          }
    
          let bodyBase = curr.body_base || curr.body || "";
          const currentKeyRaw = String(
            curr.tono_effective || curr.tono_override || curr.tono_original || curr.key || ""
          ).trim();
    
          let keyNorm = currentKeyRaw.replace(/\s+/g, "");
          const mm = keyNorm.match(/^([A-G])([#b]?)(m)?/i);
          keyNorm = mm ? mm[1].toUpperCase() + (mm[2] || "") + (mm[3] ? "m" : "") : "";
    
          const hasFlatKey = /^[A-G]b/i.test(keyNorm);
          const flatMinorKeys = ["Dm", "Gm", "Cm", "Fm", "Bbm", "Ebm", "Abm"];
    
          let preferFlats =
            hasFlatKey ||
            ["F", "Bb", "Eb", "Ab", "Db", "Gb", "Cb"].includes(keyNorm) ||
            flatMinorKeys.includes(keyNorm);
    
          if (!keyNorm) preferFlats = /\b[A-G]b\b/.test(bodyBase);
    
          let body = transposeBody(bodyBase, normalizeTransposeSteps(curr.transpose_steps), preferFlats);
    
          if (state.userRole !== "musico") {
            body = stripChordsAndCompactText(body);
            view.textContent = body;
          } else {
            renderChordText(view, body);
          }
    
          view.style.fontSize = state.currentFontSize + "px";
    
          const effectiveBpm = getEffectiveBpm(curr, 120);
          state.currentBPM = state.half ? effectiveBpm / 2 : effectiveBpm;
    
          if (state.userRole === "drums" && state.metroActive) startMetro();
        } else {
          if (dots) dots.classList.toggle("is-hidden", state.userRole === "musico");
          if (info) info.textContent = "Adoranza Cloud";
          if (view) view.textContent = "Selecciona una canción.";
          updateNowNextInfo();
        }
    
        setTimeout(initSortable, 0);
      };
    
      softRemoveSong = function softRemoveSongFixed(idx) {
        const song = state.setlist[idx];
        if (!song) return;
    
        state.lastRemoved = { song, index: idx };
        state.setlist.splice(idx, 1);
    
        if (state.currentIndex === idx) state.currentIndex = -1;
        else if (state.currentIndex > idx) state.currentIndex--;
    
        markDirty();
        saveLocal();
        renderAll();
        showUndoToast(`Quitada: ${song.titulo || "Canción"}`);
      };
    
      undoLastRemove = function undoLastRemoveFixed() {
        if (!state.lastRemoved) return;
    
        const { song, index } = state.lastRemoved;
        const idx = Math.max(0, Math.min(index, state.setlist.length));
    
        state.setlist.splice(idx, 0, song);
        state.lastRemoved = null;
    
        const toast = $("toastUndo");
        if (toast) toast.style.display = "none";
    
        markDirty();
        saveLocal();
        renderAll();
      };
    
      clearSetlist = function clearSetlistFixed() {
        const oldListKey = listKey();
    
        state.setlist = [];
        state.currentIndex = -1;
        state.listName = "";
        state.listIdUnico = "";
        state.hasUnsavedChanges = false;
    
        try {
          const hm = getHiddenMap();
          delete hm[oldListKey];
          setHiddenMap(hm);
        } catch (e) {
          console.warn("No se pudo limpiar hidden map:", e);
        }
    
        saveLocal();
        renderAll();
      };
    
      nextSong = function nextSongFixed() {
        if (!state.setlist.length) return;
    
        let idx;
        if (state.currentIndex < 0) {
          const visible = getVisibleIndexes();
          idx = visible.length ? visible[0] : -1;
        } else {
          idx = getNextVisibleIndexFixed(state.currentIndex);
        }
    
        if (idx < 0) return;
    
        state.currentIndex = idx;
        state.half = false;
        renderAll();
        scrollToReader();
      };
    
      prevSong = function prevSongFixed() {
        if (!state.setlist.length) return;
    
        let idx;
        if (state.currentIndex < 0) {
          const visible = getVisibleIndexes();
          idx = visible.length ? visible[0] : -1;
        } else {
          idx = getPrevVisibleIndex(state.currentIndex);
        }
    
        if (idx < 0) return;
    
        state.currentIndex = idx;
        state.half = false;
        renderAll();
        scrollToReader();
      };
    
      transpose = function transposeFixed(delta) {
        const curr = state.setlist[state.currentIndex];
        if (!curr) return;
    
        curr.transpose_steps = normalizeTransposeSteps(curr.transpose_steps) + delta;
    
        markDirty();
        saveLocal();
        renderAll();
      };
    
      moveSongByIndex = function moveSongByIndexFixed(idx, dir, ev) {
        if (ev) ev.stopPropagation();
    
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= state.setlist.length) return;
    
        const item = state.setlist.splice(idx, 1)[0];
        state.setlist.splice(newIdx, 0, item);
    
        if (state.currentIndex === idx) state.currentIndex = newIdx;
        else if (state.currentIndex === newIdx) state.currentIndex = idx;
    
        state.moveModeIndex = newIdx;
        markDirty();
    
        saveLocal();
        renderAll();
    
        if (state.moveModeTimer) clearTimeout(state.moveModeTimer);
        state.moveModeTimer = setTimeout(() => {
          state.moveModeIndex = -1;
          state.moveModeTimer = null;
          renderAll();
        }, 7000);
      };
    
      initSortable = function initSortableFixed() {
        const list = $("setList");
        if (!list || !window.Sortable) return;
    
        if (list._sortable) {
          try { list._sortable.destroy(); } catch (e) {}
          list._sortable = null;
        }
    
        list._sortable = Sortable.create(list, {
          animation: 150,
          draggable: ".set-item-wrap",
          handle: ".drag-handle",
          forceFallback: true,
          fallbackOnBody: false,
          fallbackTolerance: 3,
          delayOnTouchOnly: true,
          delay: 300,
          touchStartThreshold: 15,
          scroll: true,
          bubbleScroll: true,
    
          onStart: () => {
            document.body.classList.add("is-dragging-sortable");
            stopScroll();
          },
    
          onEnd: evt => {
            document.body.classList.remove("is-dragging-sortable");
    
            try {
              const oldIndex = evt.oldIndex;
              const newIndex = evt.newIndex;
    
              if (oldIndex == null || newIndex == null || oldIndex === newIndex) return;
    
              const visibleIdxs = state.setlist
                .map((song, i) => (!isHidden(song) ? i : null))
                .filter(i => i !== null);
    
              const fromActual = visibleIdxs[oldIndex];
              if (fromActual == null) return;
    
              const moved = state.setlist.splice(fromActual, 1)[0];
              if (!moved) return;
    
              const visibleAfterRemove = state.setlist
                .map((song, i) => (!isHidden(song) ? i : null))
                .filter(i => i !== null);
    
              const insertAt =
                newIndex >= visibleAfterRemove.length
                  ? state.setlist.length
                  : visibleAfterRemove[newIndex];
    
              state.setlist.splice(insertAt, 0, moved);
              state.currentIndex = state.setlist.findIndex(song => song === moved);
    
              markDirty();
              saveLocal();
              renderAll();
            } catch (e) {
              console.error("Sortable reorder error:", e);
              appAlert("Error al reordenar:\n" + (e?.message || e));
              renderAll();
            }
          }
        });
      };
    
      startMetro = function startMetroFixed() {
        stopMetro();
    
        const curr = state.setlist[state.currentIndex];
        if (!curr) return;
    
        const dots = $("metro-dots");
        if (!dots) return;
    
        const rawBeats = parseInt(curr.time_signature, 10);
        const beats = Math.max(1, Math.min(12, Number.isFinite(rawBeats) ? rawBeats : 4));
    
        const bpm = toNumber(state.currentBPM, 120);
        const safeBpm = Math.max(30, Math.min(260, bpm));
    
        dots.textContent = "";
        for (let i = 0; i < beats; i++) {
          const dot = el("div", "beat-dot");
          dot.id = `dot-${i}`;
          dots.appendChild(dot);
        }
    
        if (!state.audioCtx) {
          try {
            state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          } catch (e) {
            appAlert("No se pudo iniciar el audio del metrónomo.");
            return;
          }
        }
    
        if (state.audioCtx.state === "suspended") {
          state.audioCtx.resume().catch(() => {});
        }
    
        let step = 0;
    
        state.metroInt = setInterval(() => {
          const audioCtx = state.audioCtx;
          if (!audioCtx) return;
    
          const vr = $("volRange");
          const vol = vr ? toNumber(vr.value, 0.5) : 0.5;
    
          document.querySelectorAll(".beat-dot").forEach(d => {
            d.className = "beat-dot";
          });
    
          const dot = $(`dot-${step}`);
          if (dot) dot.classList.add(step === 0 ? "beat-active-red" : "beat-active-green");
    
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
    
          osc.type = "sine";
          osc.frequency.setValueAtTime(step === 0 ? 880 : 440, audioCtx.currentTime);
    
          gain.gain.setValueAtTime(Math.max(0, Math.min(1, vol)) * 0.3, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    
          osc.connect(gain);
          gain.connect(audioCtx.destination);
    
          osc.start();
          osc.stop(audioCtx.currentTime + 0.1);
    
          step = (step + 1) % beats;
        }, (60 / safeBpm) * 1000);
      };
    
      stopMetro = function stopMetroFixed() {
        if (state.metroInt) clearInterval(state.metroInt);
        state.metroInt = null;
    
        const md = $("metro-dots");
        if (md) md.textContent = "";
      };
    
      listarMisSetlists = async function listarMisSetlistsFixed() {
        if (!db) return;
    
        const box = $("mySetlists");
        if (box) {
          box.textContent = "";
          const loading = el("div", "", "Cargando...");
          loading.style.cssText = "color:var(--muted); font-size:12px;";
          box.appendChild(loading);
        }
    
        try {
          const adoptedIds = getAdoptedSetlists();
    
          const { data: mine, error: mineError } = await db
            .from("setlists_guardados")
            .select("*")
            .eq("owner_id", state.userId)
            .order("updated_at", { ascending: false });
    
          if (mineError) throw mineError;
    
          let all = Array.isArray(mine) ? [...mine] : [];
    
          if (adoptedIds.length) {
            const { data: adopted, error: adoptedError } = await db
              .from("setlists_guardados")
              .select("*")
              .in("id_unico", adoptedIds)
              .order("updated_at", { ascending: false });
    
            if (adoptedError) throw adoptedError;
    
            if (Array.isArray(adopted)) {
              const seen = new Set(all.map(x => String(x.id_unico || "").trim().toUpperCase()));
    
              adopted.forEach(row => {
                const code = String(row.id_unico || "").trim().toUpperCase();
                if (!seen.has(code)) {
                  all.push(row);
                  seen.add(code);
                }
              });
            }
          }
    
          if (!box) return;
          box.textContent = "";
    
          if (!all.length) {
            const empty = el("div", "", "Sin setlists.");
            empty.style.cssText = "color:var(--muted); font-size:12px;";
            box.appendChild(empty);
            return;
          }
    
          all.forEach(row => {
            const id = String(row.id_unico || "").trim().toUpperCase();
            const name = row.nombre_lista || "(Sin nombre)";
            const ownerTag = row.owner_id === state.userId ? "Mío" : "Adoptado";
    
            const item = el("div", "set-item");
            item.style.cursor = "pointer";
            item.onclick = () => copiarSetlistId(id);
    
            const titlebox = el("div", "titlebox");
            titlebox.style.paddingLeft = "6px";
    
            const title = el("div", "songtitle", name);
            const meta = el("div", "songmeta");
            meta.appendChild(txt("ID: "));
    
            const code = el("span", "", id);
            code.style.cssText = "font-family:var(--mono); color:var(--accent);";
            meta.appendChild(code);
            meta.appendChild(txt(` · ${ownerTag}`));
    
            const btn = el("button", "btn btn-add", "COP");
            btn.style.maxWidth = "56px";
            btn.onclick = ev => copiarSetlistId(id, ev);
    
            titlebox.appendChild(title);
            titlebox.appendChild(meta);
            item.appendChild(titlebox);
            item.appendChild(btn);
            box.appendChild(item);
          });
        } catch (err) {
          console.error("listarMisSetlists error:", err);
    
          if (box) {
            box.textContent = "";
            const errorBox = el("div", "", "Error cargando setlists.");
            errorBox.style.cssText = "color:var(--danger); font-size:12px;";
            box.appendChild(errorBox);
          }
        }
      };
    
      function installSafeSearch() {
        const sb = $("searchBox");
        if (!sb) return;
    
        let searchTimer = null;
    
        sb.oninput = e => {
          const val = (e.target.value || "").trim();
          const resDiv = $("results");
          if (!resDiv) return;
    
          if (searchTimer) clearTimeout(searchTimer);
    
          if (!db || val.length < 2) {
            resDiv.textContent = "";
            return;
          }
    
          searchTimer = setTimeout(async () => {
            const currentVal = (sb.value || "").trim();
            if (currentVal !== val) return;
    
            const safeVal = val.replace(/[%_,()]/g, "").trim();
    
            if (safeVal.length < 2) {
              resDiv.textContent = "";
              return;
            }
    
            const { data, error } = await db
              .from("canciones")
              .select("*")
              .or(`titulo.ilike.%${safeVal}%,artista.ilike.%${safeVal}%`)
              .limit(6);
    
            if (error) {
              console.error(error);
              resDiv.textContent = "";
              return;
            }
    
            if ((sb.value || "").trim() !== val) return;
    
            resDiv.textContent = "";
    
            (data || []).forEach(song => {
              const item = el("div", "set-item");
    
              const info = el("div");
              info.style.flex = "1";
    
              const title = el("div", "", song.titulo || "");
              title.style.cssText = "font-weight:600; font-size:13px;";
    
              const artist = el("div", "", song.artista || "");
              artist.style.cssText = "font-size:11px; color:var(--muted); margin-top:2px;";
    
              const btn = el("button", "btn btn-add", "ADD");
              btn.onclick = ev => {
                ev.stopPropagation();
                addToSetlist(song);
              };
    
              info.appendChild(title);
              info.appendChild(artist);
              item.appendChild(info);
              item.appendChild(btn);
              resDiv.appendChild(item);
            });
          }, 300);
        };
      }
    
      const originalOnload = window.onload;
    
      window.onload = async function adoranzaHotfixOnload(ev) {
        if (typeof originalOnload === "function") {
          await originalOnload.call(this, ev);
        }
    
        updateVersionLabels();
        installSafeSearch();
    
        window.normalizeOverrides = normalizeOverrides;
        window.buildCloudSetlistPayload = buildCloudSetlistPayload;
        window.renderAll = renderAll;
        window.renderFavoritesInConfig = renderFavoritesInConfig;
        window.listarMisSetlists = listarMisSetlists;
        window.softRemoveSong = softRemoveSong;
        window.undoLastRemove = undoLastRemove;
        window.clearSetlist = clearSetlist;
        window.nextSong = nextSong;
        window.prevSong = prevSong;
        window.transpose = transpose;
        window.moveSongByIndex = moveSongByIndex;
        window.initSortable = initSortable;
        window.startMetro = startMetro;
        window.stopMetro = stopMetro;
    
        renderAll();
      };
    })();
    </script>
  
  <div id="appAlert" style="display:none; position:fixed; inset:0; z-index:99999; background:rgba(0,0,0,.55);">
  <div style="max-width:520px; margin:14vh auto; background:#111; color:#fff; border-radius:16px; padding:18px; box-shadow:0 12px 40px rgba(0,0,0,.55);">
    <div style="font-weight:700; font-size:18px; margin-bottom:10px;">Adoranza</div>
    <div id="appAlertMsg" style="white-space:pre-wrap; line-height:1.35; opacity:.95;"></div>
    <div style="text-align:right; margin-top:14px;">
      <button id="appAlertOk" style="padding:10px 14px; border-radius:12px; border:none; background:#2b6cff; color:white; font-weight:700;">OK</button>
    </div>
  </div>
</div>

</body>
